<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1834" />
  <title>Universal Oxford Groupe — انضم إلى مجموعتنا على الواتساب</title>
  <meta name="description" content="Webinaire 100% Gratuit" />
  <meta property="og:title" content="Universal Oxford Groupe — انضم إلى مجموعتنا على الواتساب" />
  <meta property="og:description" content="Webinaire 100% Gratuit" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/rWTyhJ8mxtRGNYtXJ70tZOtkHzT2/social-images/social-1782921643383-Webinaire.webp" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Universal Oxford Groupe — انضم إلى مجموعتنا على الواتساب" />
  <meta name="twitter:description" content="Webinaire 100% Gratuit" />
  <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/rWTyhJ8mxtRGNYtXJ70tZOtkHzT2/social-images/social-1782921643383-Webinaire.webp" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1834;
      --navy-2: #060e20;
      --gold: #d4af37;
      --gold-soft: #e8c85c;
      --whatsapp: #25d366;
      --white: #ffffff;
      --muted: rgba(255,255,255,.75);
      --gradient-overlay: linear-gradient(180deg, rgba(10,24,52,.55) 0%, rgba(6,14,32,.78) 60%, rgba(212,175,55,.18) 100%);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: "Tajawal", system-ui, sans-serif; background: var(--navy); color: var(--white); }
    a { color: inherit; }
    button, input { font-family: inherit; }
    .hidden { display: none !important; }

    .landing {
      position: relative;
      width: 100%;
      min-height: 100svh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 0;
      background:
        radial-gradient(60% 40% at 50% 0%, rgba(212,175,55,.25) 0%, rgba(212,175,55,0) 70%),
        linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    }
    .bg-mobile,
    .bg-desktop,
    .overlay,
    .glow { position: absolute; inset: 0; pointer-events: none; }
    .bg-mobile { z-index: 0; background-size: cover; background-position: center 35%; background-repeat: no-repeat; }
    .bg-desktop { display: none; z-index: 0; background-size: contain; background-position: center center; background-repeat: no-repeat; }
    .overlay { z-index: 1; background: var(--gradient-overlay); }
    .glow { z-index: 1; background: radial-gradient(60% 40% at 50% 0%, rgba(212,175,55,.25) 0%, rgba(212,175,55,0) 70%); }
    .content { position: relative; z-index: 10; width: 100%; max-width: 672px; min-height: calc(100svh - 24px); margin: 0 auto; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .logo { width: auto; height: 80px; object-fit: contain; filter: drop-shadow(0 6px 18px rgba(212,175,55,.45)); }
    .title {
      margin: 20px 0 0;
      font-size: clamp(30px, 8vw, 56px);
      line-height: 1.13;
      font-weight: 900;
      background: linear-gradient(100deg, #fff 0%, #f4e2a8 25%, #d4af37 50%, #f4e2a8 75%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gold-shimmer 4s linear infinite;
      filter: drop-shadow(0 2px 12px rgba(212,175,55,.25));
    }
    .subtitle { margin: 16px 0 0; max-width: 576px; font-size: clamp(14px, 4vw, 18px); line-height: 1.7; color: rgba(255,255,255,.86); font-weight: 500; }
    .subtitle strong { color: var(--gold-soft); font-weight: 800; }
    .cta-zone { margin-top: auto; padding-bottom: 33vh; display: flex; flex-direction: column; align-items: center; width: 100%; }
    .whatsapp-btn {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border-radius: 999px;
      padding: 16px 32px;
      background: var(--whatsapp);
      color: #fff;
      text-decoration: none;
      font-size: clamp(18px, 4.7vw, 26px);
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      box-shadow: 0 10px 30px -8px rgba(37,211,102,.55), 0 4px 14px rgba(212,175,55,.25);
      animation: zoom-breathe 1.4s ease-in-out infinite;
      transform-origin: center;
      transition: filter .2s ease, transform .2s ease;
    }
    .whatsapp-btn:hover { filter: brightness(1.08); }
    .whatsapp-btn:active { transform: scale(.98); }
    .whatsapp-btn:before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      padding: 2px;
      background: conic-gradient(from 0deg, rgba(212,175,55,.9), rgba(255,255,255,.85), rgba(37,211,102,.9), rgba(212,175,55,.9));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: border-scan 3.5s linear infinite;
      pointer-events: none;
      z-index: -1;
    }
    .whatsapp-icon { width: 26px; height: 26px; flex: 0 0 auto; }
    .note { margin-top: 16px; font-size: 13px; color: rgba(255,255,255,.70); font-weight: 500; }
    .admin-link { position: fixed; left: 12px; bottom: 12px; z-index: 50; opacity: .18; text-decoration: none; font-size: 12px; }
    .admin-link:hover { opacity: .8; }

    .page { min-height: 100svh; padding: 40px 16px; background: linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%); display: flex; align-items: center; justify-content: center; }
    .admin-wrap { width: 100%; max-width: 760px; }
    .card { background: rgba(255,255,255,.96); color: #111827; border-radius: 18px; padding: 24px; box-shadow: 0 24px 80px rgba(0,0,0,.28); }
    .card h1 { margin: 0 0 24px; color: var(--navy); text-align: center; font-size: 28px; font-weight: 900; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .topbar h1 { margin: 0; color: #fff; font-size: 28px; font-weight: 900; }
    .form-row { margin-bottom: 16px; }
    label { display: block; margin-bottom: 8px; font-weight: 800; color: #24314d; }
    input { width: 100%; border: 1px solid #d4d8e3; border-radius: 10px; padding: 12px 14px; font-size: 16px; outline: none; background: #fff; color: #0f172a; }
    input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,.18); }
    .btn { border: 0; border-radius: 12px; padding: 12px 16px; font-weight: 900; font-size: 16px; cursor: pointer; background: var(--navy); color: #fff; width: 100%; }
    .btn:hover { filter: brightness(1.08); }
    .btn.secondary { width: auto; background: rgba(255,255,255,.92); color: var(--navy); }
    .btn.danger { width: auto; background: #fff1f2; color: #9f1239; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; padding: 6px; border-radius: 14px; background: #eef2f7; }
    .tab { border: 0; background: transparent; padding: 10px; border-radius: 10px; font-weight: 900; cursor: pointer; color: #334155; }
    .tab.active { background: #fff; color: var(--navy); box-shadow: 0 4px 18px rgba(15,23,42,.10); }
    .status { margin-top: 14px; min-height: 22px; font-weight: 700; color: #475569; text-align: center; }
    .status.ok { color: #15803d; }
    .status.err { color: #b91c1c; }
    .small { color: #64748b; font-size: 13px; line-height: 1.6; text-align: center; margin: 14px 0 0; }
    .loading { min-height: 100svh; display:flex; align-items:center; justify-content:center; background: var(--navy); color:#fff; font-weight:800; }

    @keyframes gold-shimmer { from { background-position: 0% 50%; } to { background-position: 200% 50%; } }
    @keyframes zoom-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes border-scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    @media (min-width: 640px) {
      .landing { padding-top: 40px; }
      .content { min-height: calc(100svh - 40px); }
      .logo { height: 112px; }
      .bg-mobile { display: none; }
      .bg-desktop { display: block; }
      .cta-zone { padding-bottom: 28vh; }
      .whatsapp-btn { padding: 20px 40px; }
      .whatsapp-icon { width: 30px; height: 30px; }
    }
    @media (max-width: 390px) {
      .whatsapp-btn { padding-left: 20px; padding-right: 20px; font-size: 16px; }
      .whatsapp-icon { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>
  <div id="app" class="loading">جارٍ التحميل…</div>

  <script>
    // Configuration extraite du projet Lovable original.
    // La clé ci-dessous est une clé publique / publishable Supabase utilisée côté navigateur.
    const CONFIG = {
      supabaseUrl: "https://c--fdbbd005-ac1f-4346-8f65-d746646dc518-prod.lovable.cloud",
      supabaseKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpeXJvbGNwZmRibmhvcWxhdXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTY4MTQsImV4cCI6MjA5ODQ5MjgxNH0.A7VB2rotrLCLOGP-7HvGcihBgv6c9XyTy1G0CQXm-Rw",
      fallbackWhatsapp: "https://chat.whatsapp.com/",
      logo: "https://c--fdbbd005-ac1f-4346-8f65-d746646dc518-prod.lovable.cloud/__l5e/assets-v1/c9e7543a-8a9f-4f44-a53b-ea66f38bbaf7/logo-oxford.png",
      bgMobile: "https://c--fdbbd005-ac1f-4346-8f65-d746646dc518-prod.lovable.cloud/__l5e/assets-v1/74fed4d4-ede7-4d19-a58c-b901101b91de/bg-mobile.webp",
      bgDesktop: "https://c--fdbbd005-ac1f-4346-8f65-d746646dc518-prod.lovable.cloud/__l5e/assets-v1/c62447ab-cf3e-4b65-8afa-2fb8a0e0ba78/bg-desktop.webp"
    };

    const app = document.getElementById("app");
    const sessionKey = "oxford_admin_session_v1";
    let settingsCache = null;

    function getPath() {
      const path = window.location.pathname.replace(/\/+$/, "");
      if (path.endsWith("/admin")) return "admin";
      if (path.endsWith("/auth")) return "auth";
      return "home";
    }

    function apiHeaders(token) {
      return {
        "apikey": CONFIG.supabaseKey,
        "Authorization": `Bearer ${token || CONFIG.supabaseKey}`,
        "Content-Type": "application/json"
      };
    }

    async function loadSettings() {
      if (settingsCache) return settingsCache;
      try {
        const res = await fetch(`${CONFIG.supabaseUrl}/rest/v1/site_settings?id=eq.1&select=whatsapp_link,meta_pixel_id,ga4_measurement_id`, {
          headers: apiHeaders()
        });
        if (!res.ok) throw new Error("settings fetch failed");
        const data = await res.json();
        settingsCache = data?.[0] || {};
      } catch (e) {
        settingsCache = {};
      }
      settingsCache.whatsapp_link = settingsCache.whatsapp_link || CONFIG.fallbackWhatsapp;
      settingsCache.meta_pixel_id = settingsCache.meta_pixel_id || "";
      settingsCache.ga4_measurement_id = settingsCache.ga4_measurement_id || "";
      return settingsCache;
    }

    function loadTracking(settings) {
      const metaPixelId = settings.meta_pixel_id;
      const ga4Id = settings.ga4_measurement_id;
      if (metaPixelId && !document.getElementById("meta-pixel-script")) {
        const s = document.createElement("script");
        s.id = "meta-pixel-script";
        s.async = true;
        s.innerHTML = `!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','${metaPixelId}');fbq('track','PageView');`;
        document.head.appendChild(s);
        const ns = document.createElement("noscript");
        ns.id = "meta-pixel-noscript";
        ns.innerHTML = `<img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=${metaPixelId}&ev=PageView&noscript=1"/>`;
        document.body.appendChild(ns);
      }
      if (ga4Id && !document.getElementById("ga4-script")) {
        const s = document.createElement("script");
        s.id = "ga4-script";
        s.async = true;
        s.src = `https://www.googletagmanager.com/gtag/js?id=${ga4Id}`;
        document.head.appendChild(s);
        const init = document.createElement("script");
        init.id = "ga4-init";
        init.innerHTML = `window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}window.gtag=gtag;gtag('js',new Date());gtag('config','${ga4Id}');`;
        document.head.appendChild(init);
      }
    }

    function trackWhatsappClick() {
      try { window.fbq && window.fbq("track", "Lead"); } catch(e) {}
      try { window.gtag && window.gtag("event", "whatsapp_click", { event_category: "engagement" }); } catch(e) {}
    }

    function whatsappIcon() {
      return `<svg viewBox="0 0 32 32" class="whatsapp-icon" aria-hidden="true" fill="currentColor"><path d="M19.11 17.28c-.29-.14-1.7-.84-1.96-.93-.26-.1-.45-.14-.64.14-.19.29-.74.93-.9 1.12-.17.19-.33.21-.62.07-.29-.14-1.22-.45-2.32-1.44-.86-.77-1.44-1.71-1.6-2-.17-.29-.02-.44.13-.58.13-.13.29-.33.43-.5.14-.17.19-.29.29-.48.1-.19.05-.36-.02-.5-.07-.14-.64-1.55-.88-2.12-.23-.55-.47-.48-.64-.49l-.55-.01c-.19 0-.5.07-.76.36-.26.29-1 .98-1 2.39s1.02 2.77 1.17 2.96c.14.19 2.01 3.07 4.87 4.31.68.29 1.21.47 1.62.6.68.22 1.3.19 1.79.12.55-.08 1.7-.69 1.94-1.36.24-.67.24-1.25.17-1.37-.07-.12-.26-.19-.55-.34zM16 4C9.38 4 4 9.38 4 16c0 2.11.55 4.15 1.6 5.95L4 28l6.24-1.64A11.94 11.94 0 0 0 16 28c6.62 0 12-5.38 12-12S22.62 4 16 4zm0 21.86c-1.86 0-3.68-.5-5.27-1.44l-.38-.22-3.7.97.99-3.6-.25-.37A9.83 9.83 0 0 1 6.14 16C6.14 10.57 10.57 6.14 16 6.14 21.43 6.14 25.86 10.57 25.86 16 25.86 21.43 21.43 25.86 16 25.86z" /></svg>`;
    }

    async function renderHome() {
      const settings = await loadSettings();
      loadTracking(settings);
      app.className = "";
      app.innerHTML = `
        <main class="landing" dir="rtl" lang="ar">
          <div class="bg-mobile" style="background-image:url('${CONFIG.bgMobile}')"></div>
          <div class="bg-desktop" style="background-image:url('${CONFIG.bgDesktop}')"></div>
          <div class="overlay"></div>
          <div class="glow"></div>
          <div class="content">
            <img class="logo" src="${CONFIG.logo}" alt="Universal Oxford Groupe" width="112" height="112" />
            <h1 class="title">انضمّ إلى مجموعتنا على الواتساب</h1>
            <p class="subtitle">كن أوّل من يتوصّل بآخر الويبينارات المجانية والعروض الحصرية من <strong>Universal Oxford Groupe</strong>.</p>
            <div class="cta-zone">
              <a id="whatsappBtn" class="whatsapp-btn" href="${settings.whatsapp_link}" target="_blank" rel="noopener noreferrer">
                ${whatsappIcon()}<span>انضم الآن إلى مجموعة الواتساب</span>
              </a>
              <p class="note">مجاني • بدون إزعاج • يمكنك المغادرة في أي وقت</p>
            </div>
          </div>
          <a class="admin-link" href="./admin">admin</a>
        </main>`;
      document.getElementById("whatsappBtn").addEventListener("click", trackWhatsappClick);
    }

    function getSession() {
      try { return JSON.parse(localStorage.getItem(sessionKey) || "null"); } catch(e) { return null; }
    }
    function setSession(session) { localStorage.setItem(sessionKey, JSON.stringify(session)); }
    function clearSession() { localStorage.removeItem(sessionKey); }

    async function login(email, password) {
      const res = await fetch(`${CONFIG.supabaseUrl}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: apiHeaders(),
        body: JSON.stringify({ email, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error_description || data.msg || data.message || "Erreur de connexion");
      setSession(data);
      return data;
    }

    async function isAdmin(session) {
      if (!session?.access_token || !session?.user?.id) return false;
      const res = await fetch(`${CONFIG.supabaseUrl}/rest/v1/user_roles?user_id=eq.${encodeURIComponent(session.user.id)}&role=eq.admin&select=role`, {
        headers: apiHeaders(session.access_token)
      });
      if (!res.ok) return false;
      const data = await res.json().catch(() => []);
      return data.length > 0;
    }

    async function updateSettings(payload, token) {
      const res = await fetch(`${CONFIG.supabaseUrl}/rest/v1/site_settings?id=eq.1`, {
        method: "PATCH",
        headers: { ...apiHeaders(token), "Prefer": "return=representation" },
        body: JSON.stringify({ ...payload, updated_at: new Date().toISOString() })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || data.msg || "Erreur pendant l'enregistrement");
      settingsCache = null;
      return data;
    }

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      if (!el) return;
      el.textContent = msg || "";
      el.className = `status ${type || ""}`;
    }

    function renderAuth() {
      app.className = "";
      app.innerHTML = `
        <main class="page" dir="rtl" lang="ar">
          <section class="card" style="width:100%;max-width:440px">
            <h1>تسجيل الدخول</h1>
            <form id="loginForm">
              <div class="form-row"><label for="email">البريد الإلكتروني</label><input id="email" type="email" autocomplete="email" required dir="ltr" /></div>
              <div class="form-row"><label for="password">كلمة المرور</label><input id="password" type="password" autocomplete="current-password" required dir="ltr" /></div>
              <button class="btn" type="submit" id="loginBtn">دخول</button>
              <p class="status" id="status"></p>
              <p class="small">هذه الصفحة تعمل مع نفس Supabase / Lovable Cloud الموجود في المشروع الأصلي.</p>
            </form>
          </section>
        </main>`;
      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("loginBtn");
        btn.disabled = true;
        btn.textContent = "...";
        setStatus("", "");
        try {
          await login(document.getElementById("email").value, document.getElementById("password").value);
          window.location.href = "./admin";
        } catch(err) {
          setStatus(err.message || "Erreur", "err");
        } finally {
          btn.disabled = false;
          btn.textContent = "دخول";
        }
      });
    }

    async function renderAdmin() {
      const session = getSession();
      if (!session?.access_token) { window.location.href = "./auth"; return; }
      app.className = "loading";
      app.textContent = "جارٍ التحقق…";
      const ok = await isAdmin(session);
      if (!ok) {
        clearSession();
        app.className = "";
        app.innerHTML = `<main class="page"><section class="card" style="max-width:520px;text-align:center"><h1>ليس لديك صلاحية المسؤول</h1><p class="small">تم تسجيل الخروج. تأكد أن حسابك موجود في جدول user_roles بدور admin.</p><p><a href="./auth" style="color:#0a1834;font-weight:900">العودة إلى تسجيل الدخول</a></p></section></main>`;
        return;
      }
      const settings = await loadSettings();
      app.className = "";
      app.innerHTML = `
        <main class="page" dir="rtl" lang="ar">
          <section class="admin-wrap">
            <div class="topbar">
              <h1>لوحة الإدارة</h1>
              <button class="btn secondary" id="logoutBtn" type="button">تسجيل الخروج</button>
            </div>
            <div class="card">
              <div class="tabs">
                <button class="tab active" type="button" data-tab="whatsapp">واتساب</button>
                <button class="tab" type="button" data-tab="tracking">التتبّع</button>
              </div>
              <form id="whatsappPanel">
                <div class="form-row"><label for="wa">رابط مجموعة الواتساب</label><input id="wa" type="url" dir="ltr" value="${escapeHtml(settings.whatsapp_link)}" placeholder="https://chat.whatsapp.com/..." /></div>
                <button class="btn" id="saveWhatsapp" type="submit">حفظ</button>
              </form>
              <form id="trackingPanel" class="hidden">
                <div class="form-row"><label for="pixel">Meta Pixel ID</label><input id="pixel" dir="ltr" value="${escapeHtml(settings.meta_pixel_id)}" placeholder="123456789012345" /></div>
                <div class="form-row"><label for="ga4">GA4 Measurement ID</label><input id="ga4" dir="ltr" value="${escapeHtml(settings.ga4_measurement_id)}" placeholder="G-XXXXXXXXXX" /></div>
                <button class="btn" id="saveTracking" type="submit">حفظ</button>
              </form>
              <p class="status" id="status"></p>
            </div>
          </section>
        </main>`;
      document.getElementById("logoutBtn").onclick = () => { clearSession(); window.location.href = "./auth"; };
      document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        const name = tab.dataset.tab;
        document.getElementById("whatsappPanel").classList.toggle("hidden", name !== "whatsapp");
        document.getElementById("trackingPanel").classList.toggle("hidden", name !== "tracking");
        setStatus("", "");
      }));
      document.getElementById("whatsappPanel").addEventListener("submit", async (e) => {
        e.preventDefault();
        await saveWithButton("saveWhatsapp", () => updateSettings({ whatsapp_link: document.getElementById("wa").value }, session.access_token));
      });
      document.getElementById("trackingPanel").addEventListener("submit", async (e) => {
        e.preventDefault();
        await saveWithButton("saveTracking", () => updateSettings({ meta_pixel_id: document.getElementById("pixel").value, ga4_measurement_id: document.getElementById("ga4").value }, session.access_token));
      });
    }

    async function saveWithButton(btnId, fn) {
      const btn = document.getElementById(btnId);
      const old = btn.textContent;
      btn.disabled = true;
      btn.textContent = "...";
      setStatus("", "");
      try { await fn(); setStatus("تم الحفظ", "ok"); }
      catch(err) { setStatus(err.message || "Erreur", "err"); }
      finally { btn.disabled = false; btn.textContent = old; }
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
    }

    (async function init() {
      const path = getPath();
      if (path === "auth") renderAuth();
      else if (path === "admin") await renderAdmin();
      else await renderHome();
    })();
  </script>
</body>
</html>
